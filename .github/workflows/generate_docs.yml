name: Build & Publish Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - pipelines/**
      - staging/**
      - orchestrator.py
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install sphinx myst-parser sphinx-rtd-theme pydantic pandas

      - name: Build Sphinx HTML
        working-directory: docs
        run: |
          make clean
          make html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
